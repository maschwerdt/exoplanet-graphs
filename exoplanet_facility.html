  font: { family: 'Arial, sans-serif', color: TEXT, size: 11 },
  margin: { l: 65, r: 20, t: 10, b: 60 },
  xaxis: {
    title: { text: 'Semi-Major Axis (AU)', font: { size: 13 } },
    type: 'log',
    range: [-2.3, 2.3],
    gridcolor: GRID, gridwidth: 0.5,
    linecolor: SPINE, zerolinecolor: SPINE,
    tickfont: { size: 10 },
    minor: { showgrid: true, gridcolor: '#111825' },
  },
  yaxis: {
    title: { text: 'Planet Mass (Jupiter Masses)', font: { size: 13 } },
    type: 'log',
    range: [-3.6, 1.74],
    gridcolor: GRID, gridwidth: 0.5,
    linecolor: SPINE, zerolinecolor: SPINE,
    tickfont: { size: 10 },
    minor: { showgrid: true, gridcolor: '#111825' },
  },
  legend: {
    bgcolor: 'rgba(13,18,32,0.85)',
    bordercolor: SPINE,
    borderwidth: 1,
    font: { size: 11 },
    x: 1.0, y: 1.0,
    xanchor: 'right', yanchor: 'top',
    tracegroupgap: 2,
  },
  shapes: [
    // Jupiter mass
    { type: 'line', x0: 0.005, x1: 200, xref: 'x', y0: 1, y1: 1, yref: 'y',
       line: { color: '#3A4A6A', width: 1, dash: 'dash' } },
    // Neptune mass
    { type: 'line', x0: 0.005, x1: 200, xref: 'x', y0: 0.054, y1: 0.054, yref: 'y',
       line: { color: '#3A4A6A', width: 1, dash: 'dash' } },
    // Earth mass
    { type: 'line', x0: 0.005, x1: 200, xref: 'x', y0: 0.00315, y1: 0.00315, yref: 'y',
       line: { color: '#3A4A6A', width: 1, dash: 'dash' } },
  ],
  annotations: [
    { x: 2.08, y: Math.log10(1.0) + 0.04, xref: 'x', yref: 'y',
       text: '1 Jupiter mass', showarrow: false,
       font: { size: 9, color: '#6A7A9A' }, xanchor: 'right' },
    { x: 2.08, y: Math.log10(0.054) + 0.04, xref: 'x', yref: 'y',
       text: '1 Neptune mass', showarrow: false,
       font: { size: 9, color: '#6A7A9A' }, xanchor: 'right' },
    { x: 2.08, y: Math.log10(0.00315) + 0.04, xref: 'x', yref: 'y',
       text: '1 Earth mass', showarrow: false,
       font: { size: 9, color: '#6A7A9A' }, xanchor: 'right' },
    // Earth marker label
    { x: Math.log10(1.12), y: Math.log10(0.00315), xref: 'x', yref: 'y',
       text: 'Earth', showarrow: false,
       font: { size: 10, color: '#39D353' }, xanchor: 'left' },
  ],
  hoverlabel: {
    bgcolor: '#0F1629',
    bordercolor: '#2A3D6A',
    font: { size: 12, color: TEXT },
  },
  hovermode: 'closest',
};

// Earth star marker as separate trace
const earthTrace = {
  type: 'scatter', mode: 'markers',
  name: 'Earth (reference)',
  x: [1.0], y: [0.00315],
  text: ['<b>Earth</b><br>Mass: 1 M⊕ (0.00315 M<sub>J</sub>)<br>Orbit: 1 AU<br>Radius: 1 R⊕'],
  hovertemplate: '%{text}<extra></extra>',
  marker: { symbol: 'star', size: 14, color: '#39D353',
             line: { color: '#00AA33', width: 1 } },
  showlegend: true,
};

let currentOpacity = 0.55;

function render(opacity) {
  const traces = [...buildTraces(opacity), earthTrace];
  Plotly.newPlot('plot', traces, layout, {
    responsive: true,
    displayModeBar: true,
    modeBarButtonsToRemove: ['lasso2d', 'select2d'],
    displaylogo: false,
    toImageButtonOptions: { format: 'png', filename: 'exoplanet_mass_vs_orbit', scale: 2 },
  });
  updateCount();
}

function updateCount() {
  const total = TRACES_DATA.reduce((s,t) => s + t.count, 0);
  document.getElementById('count-badge').textContent = `${total.toLocaleString()} planets shown`;
}

render(currentOpacity);

// Slider interactions
function fmtLog(v) {
  const val = Math.pow(10, parseFloat(v));
  return val < 0.01 ? val.toExponential(1) : parseFloat(val.toFixed(4));
}

document.getElementById('mass-min').addEventListener('input', function() {
  document.getElementById('mass-min-val').textContent = fmtLog(this.value);
  Plotly.relayout('plot', {'yaxis.range': [this.value, document.getElementById('mass-max').value]});
});
document.getElementById('mass-max').addEventListener('input', function() {
  document.getElementById('mass-max-val').textContent = fmtLog(this.value);
  Plotly.relayout('plot', {'yaxis.range': [document.getElementById('mass-min').value, this.value]});
});
document.getElementById('sma-min').addEventListener('input', function() {
  document.getElementById('sma-min-val').textContent = fmtLog(this.value);
  Plotly.relayout('plot', {'xaxis.range': [this.value, document.getElementById('sma-max').value]});
});
document.getElementById('sma-max').addEventListener('input', function() {
  document.getElementById('sma-max-val').textContent = fmtLog(this.value);
  Plotly.relayout('plot', {'xaxis.range': [document.getElementById('sma-min').value, this.value]});
});
document.getElementById('opacity').addEventListener('input', function() {
  currentOpacity = parseFloat(this.value);
  document.getElementById('opacity-val').textContent = currentOpacity.toFixed(2);
  Plotly.restyle('plot', {'marker.opacity': currentOpacity});
});
document.getElementById('reset-btn').addEventListener('click', function() {
  Plotly.relayout('plot', {
    'xaxis.range': [-2.3, 2.3],
    'yaxis.range': [-3.6, 1.74],
  });
  document.getElementById('mass-min').value = -4;
  document.getElementById('mass-max').value = 1.7;
  document.getElementById('sma-min').value = -2.3;
  document.getElementById('sma-max').value = 2.3;
  document.getElementById('mass-min-val').textContent = '0.0001';
  document.getElementById('mass-max-val').textContent = '50';
  document.getElementById('sma-min-val').textContent = '0.005';
  document.getElementById('sma-max-val').textContent = '200';
});
</script>
</body>
</html>
