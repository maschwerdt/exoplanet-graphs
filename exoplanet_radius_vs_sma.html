<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planet Radius vs Orbital Distance</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0A0E1A; --surface: #0d1525; --surface2: #111c30;
    --border: #1e2e4a; --text: #c8d8f0; --text-dim: #6a85aa;
    --accent: #00ffe0; --gold: #ffd060;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(1px 1px at 12% 18%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 32% 65%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 58% 12%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 78% 78%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 38%, rgba(255,255,255,0.35) 0%, transparent 100%);
  }
  .app { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }

  header { padding: 18px 32px 14px; border-bottom: 1px solid var(--border); background: rgba(10,14,26,0.88); backdrop-filter: blur(12px); }
  .header-top { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
  h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(17px,2.2vw,24px); color: #fff; letter-spacing: -0.02em; }
  .subtitle { font-size: 11px; color: var(--text-dim); font-style: italic; letter-spacing: 0.04em; }
  .count-badge { margin-left: auto; background: var(--surface2); border: 1px solid var(--border); padding: 4px 12px; border-radius: 20px; font-size: 11px; color: var(--accent); white-space: nowrap; }

  .controls { display: flex; flex-wrap: wrap; gap: 20px; padding: 12px 32px; border-bottom: 1px solid var(--border); background: rgba(13,21,37,0.92); align-items: center; }
  .control-group { display: flex; flex-direction: column; gap: 5px; }
  .control-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); }
  .method-filters { display: flex; gap: 5px; flex-wrap: wrap; }
  .method-btn { padding: 4px 11px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface); color: var(--text-dim); font-family: 'Space Mono', monospace; font-size: 10px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .method-btn:hover { border-color: var(--accent); color: var(--accent); }
  .method-btn.active { background: var(--accent); color: #080d18; border-color: var(--accent); font-weight: 700; }
  .slider-row { display: flex; align-items: center; gap: 8px; }
  .slider-val { font-size: 10px; color: var(--accent); min-width: 34px; text-align: right; }
  input[type=range] { -webkit-appearance: none; width: 110px; height: 3px; background: var(--border); border-radius: 2px; outline: none; cursor: pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 11px; height: 11px; background: var(--accent); border-radius: 50%; cursor: pointer; }
  input[type=range]::-moz-range-thumb { width: 11px; height: 11px; background: var(--accent); border: none; border-radius: 50%; cursor: pointer; }
  .btn-row { display: flex; gap: 5px; }
  .icon-btn { padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-family: 'Space Mono', monospace; font-size: 13px; cursor: pointer; transition: all 0.15s; line-height: 1; }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .reset-btn { margin-left: auto; padding: 4px 13px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-family: 'Space Mono', monospace; font-size: 10px; cursor: pointer; transition: all 0.15s; }
  .reset-btn:hover { border-color: var(--gold); color: var(--gold); }

  .chart-wrap { flex: 1; display: flex; padding: 14px 24px 18px 32px; gap: 0; min-height: 0; }
  #chart-container { flex: 1; position: relative; min-height: 500px; cursor: grab; user-select: none; }
  #chart-container:active { cursor: grabbing; }
  .axis text { font-family: 'Space Mono', monospace; font-size: 10px; fill: #8899bb; }
  .axis line, .axis path { stroke: #2A3A5A; }
  .axis-label { font-family: 'Syne', sans-serif; font-size: 12px; fill: #AABBCC; font-weight: 600; }
  .dot { cursor: pointer; transition: opacity 0.15s; }
  .dot.dimmed { opacity: 0.05 !important; }
  .clip-group { clip-path: url(#plot-clip); }

  /* Colorbar panel */
  .colorbar-panel { display: flex; flex-direction: row; align-items: stretch; padding: 0 0 0 12px; }
  .colorbar-inner { display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
  .cb-ylabel { writing-mode: vertical-rl; transform: rotate(180deg); font-family: 'Syne', sans-serif; font-size: 10px; color: #AABBCC; font-weight: 600; letter-spacing: 0.05em; margin-left: 6px; white-space: nowrap; align-self: center; }

  /* Size legend — compact, bottom-right inside chart */
  .size-legend {
    position: absolute; bottom: 48px; right: 6px;
    background: rgba(13,21,37,0.6); border: 1px solid rgba(30,46,74,0.8);
    border-radius: 3px; padding: 4px 7px; display: flex; flex-direction: column;
    gap: 1px; color: var(--text-dim);
  }
  .size-legend-title { color: #88BBFF; font-size: 7.5px; font-weight: 700; margin-bottom: 2px; letter-spacing: 0.06em; text-transform: uppercase; }
  .size-legend-item { display: flex; align-items: center; gap: 5px; font-size: 7.5px; line-height: 1.6; }
  .size-legend-item svg { flex-shrink: 0; }

  #tooltip { position: fixed; background: rgba(8,13,24,0.97); border: 1px solid var(--accent); border-radius: 6px; padding: 10px 14px; font-size: 11px; pointer-events: none; opacity: 0; transition: opacity 0.1s; max-width: 230px; z-index: 100; box-shadow: 0 0 18px rgba(0,255,224,0.1); }
  #tooltip.visible { opacity: 1; }
  .tt-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; color: #fff; margin-bottom: 5px; }
  .tt-row { display: flex; justify-content: space-between; gap: 14px; color: var(--text-dim); margin: 1px 0; }
  .tt-row span:last-child { color: var(--text); text-align: right; }
  .tt-method { display: inline-block; margin-top: 5px; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 7px; border-radius: 10px; background: var(--surface2); color: var(--accent); border: 1px solid var(--border); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-top">
      <div>
        <h1>Planet Radius vs Orbital Distance</h1>
        <div class="subtitle">color = host star temperature &nbsp;·&nbsp; size = planet mass &nbsp;·&nbsp; scroll to zoom &nbsp;·&nbsp; drag to pan</div>
      </div>
      <div class="count-badge" id="count-badge">5,322 exoplanets</div>
    </div>
  </header>

  <div class="controls">
    <div class="control-group">
      <div class="control-label">Discovery Method</div>
      <div class="method-filters" id="method-filters"></div>
    </div>
    <div class="control-group">
      <div class="control-label">Year Range</div>
      <div class="slider-row">
        <span class="slider-val" id="year-min-val">1995</span>
        <input type="range" id="year-min" min="1995" max="2026" value="1995">
        <span style="color:var(--text-dim);font-size:10px;">–</span>
        <input type="range" id="year-max" min="1995" max="2026" value="2026">
        <span class="slider-val" id="year-max-val">2026</span>
      </div>
    </div>
    <div class="control-group">
      <div class="control-label">Zoom</div>
      <div class="btn-row">
        <button class="icon-btn" id="zoom-in">＋</button>
        <button class="icon-btn" id="zoom-out">－</button>
        <button class="icon-btn" id="zoom-reset" title="Reset zoom">⟳</button>
      </div>
    </div>
    <button class="reset-btn" id="reset-btn">↺ Reset All</button>
  </div>

  <div class="chart-wrap">
    <div id="chart-container">
      <div class="size-legend">
        <div class="size-legend-title">Planet Mass (M♃)</div>
        <div class="size-legend-item">
          <svg width="8" height="8"><circle cx="4" cy="4" r="1.4" fill="#ccddee" opacity="0.85"/></svg>
          <span>Earth (0.003)</span>
        </div>
        <div class="size-legend-item">
          <svg width="16" height="16"><circle cx="8" cy="8" r="3.8" fill="#ccddee" opacity="0.85"/></svg>
          <span>Neptune (0.054)</span>
        </div>
        <div class="size-legend-item">
          <svg width="26" height="26"><circle cx="13" cy="13" r="9" fill="#ccddee" opacity="0.85"/></svg>
          <span>Jupiter (1.0)</span>
        </div>
      </div>
    </div>

    <div class="colorbar-panel">
      <div class="colorbar-inner">
        <svg id="colorbar-svg" width="70" height="500" style="overflow:visible;"></svg>
      </div>
      <div class="cb-ylabel">Host Star Temperature (K)</div>
    </div>
  </div>
</div>
<div id="tooltip"></div>

// ── Constants ────────────────────────────────────────────────────────────────
const METHODS = ['All','Transit','Radial Velocity','Imaging','TTV','Microlensing','Other'];
const TEMP_MIN = 2500, TEMP_MAX = 9500;
let activeMethod = 'All', yearMin = 1995, yearMax = 2026;

// ── Color scale — exact pixel-sampled from reference image ──────────────────
const colorStops = [
  [0.00, '#e04b4d'], [0.07, '#f95050'], [0.14, '#ff5a4c'],
  [0.21, '#ff784e'], [0.29, '#ffa658'], [0.36, '#ffc46c'],
  [0.50, '#ffe08e'], [0.57, '#fff5dc'], [0.64, '#fafbff'],
  [0.71, '#d6e4ff'], [0.79, '#8aadff'], [0.86, '#698dff'],
  [0.93, '#567bff'], [1.00, '#4e74fd'],
];
const tempScale = d3.scaleLinear()
  .domain(colorStops.map(s => TEMP_MIN + s[0] * (TEMP_MAX - TEMP_MIN)))
  .range(colorStops.map(s => s[1]))
  .clamp(true);

function dotColor(t) { return tempScale(t); }

// ── Size scale — matches static v6 exactly ──────────────────────────────────
const LOG_MIN = Math.log10(0.0001), LOG_MAX = Math.log10(30);
function dotRadius(mjup) {
  const m = Math.max(mjup || 0.0001, 0.0001);
  const mn = (Math.log10(m) - LOG_MIN) / (LOG_MAX - LOG_MIN);
  const area = 0.5 + Math.pow(mn, 2.8) * 110;
  return Math.sqrt(area / Math.PI);  // convert area→radius for SVG circles
}
// Verify anchors match static legend
['Earth:0.00315','Neptune:0.054','Jupiter:1.0'].forEach(s => {
  const [n,v] = s.split(':');
  const a = 0.5 + Math.pow((Math.log10(+v)-LOG_MIN)/(LOG_MAX-LOG_MIN),2.8)*110;
  console.log(n, 'area:', a.toFixed(1), 'r:', Math.sqrt(a/Math.PI).toFixed(1));
});

// ── Colorbar ─────────────────────────────────────────────────────────────────
function drawColorbar() {
  const svg = d3.select('#colorbar-svg');
  const cH = document.getElementById('chart-container').clientHeight - 48;
  const BAR_W = 14, BAR_H = Math.max(cH, 300);

  svg.attr('height', BAR_H + 40);
  const defs = svg.append('defs');
  const grad = defs.append('linearGradient').attr('id','cb-grad').attr('x1',0).attr('y1',0).attr('x2',0).attr('y2',1);
  // top = hot (blue), bottom = cool (red)
  colorStops.slice().reverse().forEach((s, i) => {
    grad.append('stop').attr('offset', s[0]).attr('stop-color', colorStops[colorStops.length-1-i][1]);
  });
  // Rebuild: top=hot, bottom=cool
  svg.select('defs').select('linearGradient').selectAll('stop').remove();
  for (let i = 0; i <= 50; i++) {
    const frac = i / 50;
    const temp = TEMP_MAX - frac * (TEMP_MAX - TEMP_MIN);
    svg.select('#cb-grad').append('stop').attr('offset', frac).attr('stop-color', dotColor(temp));
  }

  svg.append('rect').attr('x', 0).attr('y', 0).attr('width', BAR_W).attr('height', BAR_H)
    .attr('fill','url(#cb-grad)').attr('rx', 2)
    .attr('stroke','#2A3A5A').attr('stroke-width', 0.5);

  // Ticks
  [9000,8000,7000,6000,5000,4000,3000].forEach(t => {
    const y = (TEMP_MAX - t) / (TEMP_MAX - TEMP_MIN) * BAR_H;
    svg.append('line').attr('x1', BAR_W).attr('x2', BAR_W+4).attr('y1', y).attr('y2', y)
      .attr('stroke','#8899BB').attr('stroke-width', 0.8);
    svg.append('text').attr('x', BAR_W+6).attr('y', y).attr('dominant-baseline','middle')
      .attr('font-family','Space Mono,monospace').attr('font-size', 8.5).attr('fill','#AABBCC')
      .text(t.toLocaleString());
  });

  // Spectral type labels
  [{l:'A',t:8800},{l:'F',t:6700},{l:'G',t:5700},{l:'K',t:4300},{l:'M',t:3100}].forEach(s => {
    const y = (TEMP_MAX - s.t) / (TEMP_MAX - TEMP_MIN) * BAR_H;
    svg.append('text').attr('x', BAR_W+38).attr('y', y).attr('dominant-baseline','middle')
      .attr('font-family','Space Mono,monospace').attr('font-size', 9.5).attr('fill','#AABBCC')
      .text(s.l);
  });
}

// ── Method buttons ────────────────────────────────────────────────────────────
function buildMethodFilters() {
  const c = document.getElementById('method-filters');
  METHODS.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'method-btn' + (m === 'All' ? ' active' : '');
    btn.textContent = m;
    btn.addEventListener('click', () => {
      activeMethod = m;
      document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      updateDots();
    });
    c.appendChild(btn);
  });
}

// ── Sliders ───────────────────────────────────────────────────────────────────
function buildSliders() {
  const ymn = document.getElementById('year-min'), ymx = document.getElementById('year-max');
  function sync() {
    yearMin = Math.min(+ymn.value, +ymx.value);
    yearMax = Math.max(+ymn.value, +ymx.value);
    document.getElementById('year-min-val').textContent = yearMin;
    document.getElementById('year-max-val').textContent = yearMax;
    updateDots();
  }
  ymn.addEventListener('input', sync); ymx.addEventListener('input', sync);

  document.getElementById('reset-btn').addEventListener('click', () => {
    activeMethod = 'All'; yearMin = 1995; yearMax = 2026;
    ymn.value = 1995; ymx.value = 2026;
    document.getElementById('year-min-val').textContent = 1995;
    document.getElementById('year-max-val').textContent = 2026;
    document.querySelectorAll('.method-btn').forEach((b,i) => b.classList.toggle('active', i===0));
    svgSel.transition().duration(400).call(zoomBehavior.transform, d3.zoomIdentity);
    updateDots();
  });
}

// ── Chart ─────────────────────────────────────────────────────────────────────
const M = { top: 22, right: 20, bottom: 52, left: 68 };
let svgSel, dotsG, xSc, ySc, xAxisFn, yAxisFn, xAxisG, yAxisG, zoomBehavior, gridG, refG, earthG, curX, curY;

function initChart() {
  const container = document.getElementById('chart-container');
  const W = container.clientWidth, H = container.clientHeight;
  const w = W - M.left - M.right, h = H - M.top - M.bottom;

  d3.select('#chart-container svg').remove();

  svgSel = d3.select('#chart-container').append('svg').attr('width', W).attr('height', H);

  svgSel.append('defs').append('clipPath').attr('id','plot-clip')
    .append('rect').attr('width', w).attr('height', h);

  const g = svgSel.append('g').attr('transform', `translate(${M.left},${M.top})`);

  xSc = d3.scaleLog().domain([0.004, 20]).range([0, w]);
  ySc = d3.scaleLog().domain([0.28, 22]).range([h, 0]);
  curX = xSc.copy(); curY = ySc.copy();

  // Grid
  gridG = g.append('g').attr('clip-path','url(#plot-clip)');
  drawGrid(gridG, xSc, ySc, w, h);

  // Reference lines
  refG = g.append('g').attr('clip-path','url(#plot-clip)');
  drawRefLines(refG, ySc, w);

  // Axes
  xAxisFn = d3.axisBottom(xSc).tickValues([0.01,0.1,1,10]).tickFormat(d => d+'');
  yAxisFn = d3.axisLeft(ySc).tickValues([0.3,0.5,1,2,3,5,10,20]).tickFormat(d => d+'');
  xAxisG = g.append('g').attr('class','axis').attr('transform',`translate(0,${h})`).call(xAxisFn);
  yAxisG = g.append('g').attr('class','axis').call(yAxisFn);

  g.append('text').attr('class','axis-label').attr('x', w/2).attr('y', h+42).attr('text-anchor','middle').text('Semi-Major Axis (AU)');
  g.append('text').attr('class','axis-label').attr('transform','rotate(-90)').attr('x',-h/2).attr('y',-54).attr('text-anchor','middle').text('Planet Radius (Earth Radii)');

  // Dots
  dotsG = g.append('g').attr('clip-path','url(#plot-clip)');

  // Earth ref
  earthG = g.append('g').attr('clip-path','url(#plot-clip)');
  buildEarthRef(earthG, xSc, ySc);

  // Zoom
  zoomBehavior = d3.zoom().scaleExtent([0.4, 80])
    .on('zoom', (event) => {
      const t = event.transform;
      curX = t.rescaleX(xSc);
      curY = t.rescaleY(ySc);
      drawGrid(gridG, curX, curY, w, h);
      drawRefLines(refG, curY, w);
      xAxisG.call(xAxisFn.scale(curX));
      yAxisG.call(yAxisFn.scale(curY));
      dotsG.selectAll('.dot').attr('cx', d => curX(d.a)).attr('cy', d => curY(d.r));
      updateEarthRef(earthG, curX, curY);
    });

  svgSel.call(zoomBehavior).on('dblclick.zoom', null);

  document.getElementById('zoom-in').onclick = () => svgSel.transition().duration(280).call(zoomBehavior.scaleBy, 1.6);
  document.getElementById('zoom-out').onclick = () => svgSel.transition().duration(280).call(zoomBehavior.scaleBy, 1/1.6);
  document.getElementById('zoom-reset').onclick = () => svgSel.transition().duration(380).call(zoomBehavior.transform, d3.zoomIdentity);

  updateDots();
}

function drawGrid(gEl, xs, ys, w, h) {
  gEl.selectAll('.gx,.gy').remove();
  [0.004,0.01,0.03,0.1,0.3,1,3,10,20].forEach(v => {
    gEl.append('line').attr('class','gx')
      .attr('x1',xs(v)).attr('x2',xs(v)).attr('y1',0).attr('y2',h)
      .attr('stroke','#1A2540').attr('stroke-width',0.5);
  });
  [0.3,0.5,1,2,3,5,10,20].forEach(v => {
    gEl.append('line').attr('class','gy')
      .attr('x1',0).attr('x2',w).attr('y1',ys(v)).attr('y2',ys(v))
      .attr('stroke','#1A2540').attr('stroke-width',0.5);
  });
  // Minor grid
  [0.005,0.006,0.007,0.008,0.009,0.02,0.04,0.05,0.06,0.07,0.08,0.09,0.2,0.4,0.5,0.6,0.7,0.8,0.9,2,4,5,6,7,8,9,15].forEach(v => {
    gEl.append('line').attr('class','gx')
      .attr('x1',xs(v)).attr('x2',xs(v)).attr('y1',0).attr('y2',h)
      .attr('stroke','#111825').attr('stroke-width',0.3);
  });
}

function drawRefLines(gEl, ys, w) {
  gEl.selectAll('.ref-line,.ref-lbl').remove();
  [{v:11.21,l:'1 Jupiter radius'},{v:3.88,l:'1 Neptune radius'},{v:1.0,l:'1 Earth radius'}].forEach(r => {
    gEl.append('line').attr('class','ref-line')
      .attr('x1',0).attr('x2',w).attr('y1',ys(r.v)).attr('y2',ys(r.v))
      .attr('stroke','#1AFFE4').attr('stroke-width',0.6).attr('stroke-dasharray','5,4').attr('opacity',0.45);
    gEl.append('text').attr('class','ref-lbl')
      .attr('x', w-5).attr('y', ys(r.v)-4)
      .attr('text-anchor','end').attr('font-family','Space Mono,monospace')
      .attr('font-size',8.5).attr('fill','#1AFFE4').attr('opacity',0.7).text(r.l);
  });
}

function buildEarthRef(gEl, xs, ys) {
  const ex = xs(1.0), ey = ys(1.0);
  const r = dotRadius(0.00315);
  gEl.append('circle').attr('class','earth-dot')
    .attr('cx',ex).attr('cy',ey).attr('r', r)
    .attr('fill', dotColor(5778))
    .attr('stroke','#00FFCC').attr('stroke-width',1.2).attr('opacity',1);
  gEl.append('line').attr('class','earth-line')
    .attr('x1',ex).attr('y1',ey+r+4).attr('x2',ex).attr('y2',ey+r+22)
    .attr('stroke','#00FFCC').attr('stroke-width',1);
  const lbl = gEl.append('g').attr('class','earth-lbl').attr('transform',`translate(${ex},${ey+r+30})`);
  lbl.append('rect').attr('x',-18).attr('y',-8).attr('width',36).attr('height',14)
    .attr('rx',3).attr('fill','#00FFCC').attr('opacity',0.92).attr('stroke','white').attr('stroke-width',0.5);
  lbl.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
    .attr('font-family','Space Mono,monospace').attr('font-size',9).attr('font-weight',700)
    .attr('fill','#080d18').text('Earth');
}

function updateEarthRef(gEl, xs, ys) {
  const ex = xs(1.0), ey = ys(1.0);
  const r = dotRadius(0.00315);
  gEl.select('.earth-dot').attr('cx',ex).attr('cy',ey);
  gEl.select('.earth-line').attr('x1',ex).attr('y1',ey+r+4).attr('x2',ex).attr('y2',ey+r+22);
  gEl.select('.earth-lbl').attr('transform',`translate(${ex},${ey+r+30})`);
}

function isVisible(d) {
  if (activeMethod !== 'All' && d.mt !== activeMethod) return false;
  if (d.y < yearMin || d.y > yearMax) return false;
  return true;
}

function updateDots() {
  const visible = DATA.filter(isVisible);
  document.getElementById('count-badge').textContent = `${visible.length.toLocaleString()} exoplanets`;

  // Sort small first → large on top
  const sorted = [...DATA].sort((a,b) => dotRadius(a.m||0.0001) - dotRadius(b.m||0.0001));

  const dots = dotsG.selectAll('.dot').data(sorted, d => d.n);

  dots.enter().append('circle').attr('class','dot')
    .attr('cx', d => curX(d.a)).attr('cy', d => curY(d.r))
    .attr('r', d => dotRadius(d.m || 0.0001))
    .attr('fill', d => dotColor(d.t))
    .attr('opacity', 0.75)
    .on('mousemove', showTooltip)
    .on('mouseleave', hideTooltip)
    .merge(dots)
    .attr('cx', d => curX(d.a)).attr('cy', d => curY(d.r))
    .attr('r', d => dotRadius(d.m || 0.0001))
    .attr('fill', d => dotColor(d.t))
    .classed('dimmed', d => !isVisible(d));

  dots.exit().remove();
}

// ── Tooltip ───────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
function showTooltip(event, d) {
  const mJup = d.m ? d.m.toFixed(4) : 'N/A';
  const mEarth = d.m ? (d.m * 317.83).toFixed(1) : 'N/A';
  tooltip.innerHTML = `
    <div class="tt-name">${d.n}</div>
    <div class="tt-row"><span>Host</span><span>${d.h}</span></div>
    <div class="tt-row"><span>Radius</span><span>${d.r.toFixed(2)} R⊕</span></div>
    <div class="tt-row"><span>Mass</span><span>${mJup} M♃ (${mEarth} M⊕)</span></div>
    <div class="tt-row"><span>Semi-Major Axis</span><span>${d.a.toFixed(3)} AU</span></div>
    <div class="tt-row"><span>Star Temp</span><span>${d.t.toLocaleString()} K</span></div>
    <div class="tt-row"><span>Discovered</span><span>${d.y || '?'}</span></div>
    ${d.d ? `<div class="tt-row"><span>Distance</span><span>${d.d} pc</span></div>` : ''}
    <span class="tt-method">${d.mt}</span>
  `;
  tooltip.classList.add('visible');
  posTooltip(event);
}
function hideTooltip() { tooltip.classList.remove('visible'); }
function posTooltip(e) {
  const tw = 230, th = 210;
  let x = e.clientX+14, y = e.clientY-20;
  if (x+tw > window.innerWidth-8) x = e.clientX-tw-14;
  if (y+th > window.innerHeight-8) y = window.innerHeight-th-8;
  tooltip.style.left = x+'px'; tooltip.style.top = y+'px';
}
document.addEventListener('mousemove', e => { if (tooltip.classList.contains('visible')) posTooltip(e); });

// ── Init ──────────────────────────────────────────────────────────────────────
buildMethodFilters();
buildSliders();
window.addEventListener('load', () => { initChart(); drawColorbar(); });
window.addEventListener('resize', () => { initChart(); drawColorbar(); });
</script>
</body>
