const logMass = RAW.map(d => Math.log10(Math.max(d.mass_jup, 0.0001)));
const logMin = Math.log10(0.001), logMax = Math.log10(100);

const jetScale = [
  [0.0,'#000080'],[0.1,'#0000ff'],[0.2,'#007fff'],
  [0.3,'#00ffff'],[0.4,'#7fff7f'],[0.5,'#ffff00'],
  [0.6,'#ff7f00'],[0.7,'#ff0000'],[0.85,'#800000'],[1.0,'#4b0000']
];

const hover = RAW.map(d => [
  `<b>${d.planet}</b>`,
  `Host: ${d.host}`,
  `Eq. Temp: ${d.eq_temp.toLocaleString()} K`,
  `Stellar Temp: ${d.stellar_temp.toLocaleString()} K`,
  `Mass: ${d.mass_jup} Jupiter`,
  `Radius: ${d.radius_earth} R⊕`,
  `Method: ${d.method}`,
  d.year ? `Discovered: ${d.year}` : '',
  d.period ? `Orbital Period: ${d.period.toLocaleString()} days` : '',
  d.sma ? `Semi-Major Axis: ${d.sma} AU` : '',
].filter(Boolean).join('<br>'));

// ── radius size helper (must match Python formula) ──
const R_MIN = 0.31, R_MAX = 33.6;
function dispSize(r) {
  const s = 5 + 195 * Math.pow((r - R_MIN)/(R_MAX - R_MIN), 1.5);
  return Math.sqrt(s) * 1.5 + 2;
}

// ── main data trace ──
const traceMain = {
  x: RAW.map(d => d.stellar_temp),
  y: RAW.map(d => d.eq_temp),
  mode: 'markers', type: 'scatter',
  name: 'Exoplanets',
  showlegend: false,
  marker: {
    size: RAW.map(d => dispSize(d.radius_earth)),
    color: logMass,
    colorscale: jetScale,
    cmin: logMin, cmax: logMax,
    colorbar: {
      title: { text: 'Planet Mass (Jupiter Masses)', side:'right', font:{color:'#fff',size:11} },
      tickvals: [Math.log10(0.001),Math.log10(0.01),Math.log10(0.1),Math.log10(1),Math.log10(10),Math.log10(100)],
      ticktext: ['0.001','0.01','0.1','1','10','100'],
      tickfont: {color:'#fff',size:10},
      len:0.55, thickness:18, x:1.01,
    },
    opacity:0.85, line:{width:0},
  },
  text: hover,
  hovertemplate: '%{text}<extra></extra>',
};
