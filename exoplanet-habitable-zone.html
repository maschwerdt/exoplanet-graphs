  [0.3,'#00ffff'],[0.4,'#7fff7f'],[0.5,'#ffff00'],

  `Mass: ${d.mass_jup} Jupiter`,
  `Radius: ${d.radius_earth} R⊕`,
  `Method: ${d.method}`,
  d.year ? `Discovered: ${d.year}` : '',

].filter(Boolean).join('<br>'));

const R_MIN = 0.31, R_MAX = 33.6;
function dispSize(r) {
  const s = 10 + 120 * Math.pow((r - R_MIN)/(R_MAX - R_MIN), 1.5);
  return 4 + 60 * Math.pow((r - R_MIN)/(R_MAX - R_MIN), 1.2);
}
