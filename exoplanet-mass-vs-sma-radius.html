<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planet Mass vs Planet Radius</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080d18;
    --surface: #0d1525;
    --surface2: #111c30;
    --border: #1e2e4a;
    --text: #c8d8f0;
    --text-dim: #6a85aa;
    --accent: #00ffe0;
    --gold: #ffd060;
    --blue-light: #88bbff;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Star field background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 15%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 35%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 20% 85%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 50%, rgba(255,255,255,0.25) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }

  /* Header */
  header {
    padding: 20px 32px 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(8,13,24,0.85);
    backdrop-filter: blur(12px);
  }

  .header-top { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(18px, 2.5vw, 26px);
    color: #fff;
    letter-spacing: -0.02em;
  }

  .subtitle {
    font-size: 11px;
    color: var(--text-dim);
    font-style: italic;
    letter-spacing: 0.04em;
  }

  .count-badge {
    margin-left: auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    color: var(--accent);
    white-space: nowrap;
  }

  /* Controls */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    padding: 14px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(13,21,37,0.9);
    align-items: center;
  }

  .control-group { display: flex; flex-direction: column; gap: 6px; }
  .control-label {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* Method filters */
  .method-filters { display: flex; gap: 6px; flex-wrap: wrap; }

  .method-btn {
    padding: 5px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  .method-btn:hover { border-color: var(--accent); color: var(--accent); }
  .method-btn.active { background: var(--accent); color: #080d18; border-color: var(--accent); font-weight: 700; }

  /* Range sliders */
  .slider-row { display: flex; align-items: center; gap: 8px; }
  .slider-val { font-size: 10px; color: var(--accent); min-width: 38px; text-align: right; }

  input[type=range] {
    -webkit-appearance: none;
    width: 120px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
  }
  input[type=range]::-moz-range-thumb {
    width: 12px; height: 12px;
    background: var(--accent);
    border: none;
    border-radius: 50%;
    cursor: pointer;
  }

  /* Main chart area */
  .chart-wrap {
    flex: 1;
    display: flex;
    padding: 16px 32px 20px;
    gap: 16px;
    min-height: 0;
  }

  #chart-container {
    flex: 1;
    position: relative;
    min-height: 480px;
  }

  svg { width: 100%; height: 100%; }

  /* Axes */
  .axis text { font-family: 'Space Mono', monospace; font-size: 10px; fill: #6a85aa; }
  .axis line, .axis path { stroke: #1e2e4a; }
  .axis-label { font-family: 'Syne', sans-serif; font-size: 12px; fill: #8899bb; font-weight: 600; }
  .grid line { stroke: #131f35; stroke-width: 0.5; }
  .grid-minor line { stroke: #0f1a2c; stroke-width: 0.3; }

  /* Dots */
  .dot { cursor: pointer; transition: opacity 0.15s; }
  .dot:hover { stroke: white; stroke-width: 1px; }
  .dot.dimmed { opacity: 0.08; }

  /* Reference points */
  .ref-star { cursor: default; }
  .ref-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    pointer-events: none;
  }
  .ref-label-bg { rx: 3; ry: 3; }

  /* Tooltip */
  #tooltip {
    position: fixed;
    background: rgba(8,13,24,0.96);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 11px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.12s;
    max-width: 240px;
    z-index: 100;
    box-shadow: 0 0 20px rgba(0,255,224,0.12);
  }
  #tooltip.visible { opacity: 1; }
  .tt-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; color: #fff; margin-bottom: 6px; }
  .tt-row { display: flex; justify-content: space-between; gap: 16px; color: var(--text-dim); margin: 2px 0; }
  .tt-row span:last-child { color: var(--text); text-align: right; }
  .tt-method { display: inline-block; margin-top: 6px; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 8px; border-radius: 10px; background: var(--surface2); color: var(--accent); border: 1px solid var(--border); }

  /* Colorbar */
  .colorbar-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding-top: 8px;
  }
  .colorbar-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; writing-mode: vertical-rl; transform: rotate(180deg); margin-bottom: 4px; }
  #colorbar-canvas { border-radius: 4px; border: 1px solid var(--border); }
  .colorbar-ticks { display: flex; flex-direction: column; justify-content: space-between; font-size: 9px; color: var(--text-dim); height: 240px; }
  .spec-labels { display: flex; flex-direction: column; justify-content: space-between; font-size: 9px; color: #8899aa; height: 240px; margin-left: 4px; }

  /* Size legend */
  .size-legend {
    position: absolute;
    bottom: 48px;
    right: 12px;
    background: rgba(13,21,37,0.85);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 10px;
  }
  .size-legend-title { color: var(--text-dim); font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .size-legend-item { display: flex; align-items: center; gap: 8px; margin: 5px 0; color: var(--text-dim); }
  .size-legend-item svg { flex-shrink: 0; }

  /* Reset button */
  .reset-btn {
    margin-left: auto;
    padding: 5px 14px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .reset-btn:hover { border-color: var(--gold); color: var(--gold); }
</style>
</head>

<div class="app">

</div>

  { name:'Jupiter', m:317.83, r:11.21, color:'#FFD700', labelX:'right', labelY:'above' },
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let activeMethod = 'All';
let yearMin = 1995, yearMax = 2026;
let tempMin = 2320, tempMax = 10000;

// ── COLOR SCALE ───────────────────────────────────────────────────────────────
const tempScale = d3.scaleSequential()
  .domain([TEMP_MIN, TEMP_MAX])
  .interpolator(d3.interpolateRgbBasis(
    ['#CC2200','#E05000','#E88820','#F5C518','#FFFAEE','#AACCFF','#5599EE','#2255CC']
  ));

// ── SIZE SCALE ────────────────────────────────────────────────────────────────
const rMin = d3.min(DATA, d => d.r), rMax = d3.max(DATA, d => d.r);
function dotSize(r) {
  const rn = (r - rMin) / (rMax - rMin);
  return 1.5 + Math.pow(rn, 0.6) * 10; // radius in px
}

// ── COLORBAR ──────────────────────────────────────────────────────────────────
function drawColorbar() {
  const canvas = document.getElementById('colorbar-canvas');
  const ctx = canvas.getContext('2d');
  const h = canvas.height, w = canvas.width;
  for (let i = 0; i < h; i++) {
    const t = TEMP_MIN + (TEMP_MAX - TEMP_MIN) * (1 - i / h);
    ctx.fillStyle = tempScale(t);
    ctx.fillRect(0, i, w, 1);
  }

  // Ticks
  const ticksEl = document.getElementById('colorbar-ticks');
  const ticks = [9000, 8000, 7000, 6000, 5000, 4000, 3000, 2500];
  ticksEl.innerHTML = ticks.map(t => {
    return `<span>${t.toLocaleString()}</span>`;
  }).join('');

  // Spectral labels
  const specs = [
    {label:'A', temp:8500}, {label:'F', temp:6700},
    {label:'G', temp:5600}, {label:'K', temp:4400}, {label:'M', temp:3200}
  ];
  const specEl = document.getElementById('spec-labels');
  specEl.innerHTML = specs.map(s => {
    const frac = (TEMP_MAX - s.temp) / (TEMP_MAX - TEMP_MIN);
    const top = frac * 240;
    return `<span style="position:absolute;top:${top}px;transform:translateY(-50%);color:#8899aa">${s.label}</span>`;
  }).join('');
  specEl.style.position = 'relative';
}

// ── METHOD FILTER BUTTONS ─────────────────────────────────────────────────────
function buildMethodFilters() {
  const container = document.getElementById('method-filters');
  METHODS.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'method-btn' + (m === 'All' ? ' active' : '');
    btn.textContent = m;
    btn.style.setProperty('--mc', METHOD_COLORS[m] || '#aaa');
    btn.addEventListener('click', () => {
      activeMethod = m;
      document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      updateChart();
    });
    container.appendChild(btn);
  });
}

// ── SLIDERS ───────────────────────────────────────────────────────────────────
function buildSliders() {
  const ymn = document.getElementById('year-min');
  const ymx = document.getElementById('year-max');
  const tmn = document.getElementById('temp-min');
  const tmx = document.getElementById('temp-max');

  function syncYear() {
    yearMin = Math.min(+ymn.value, +ymx.value);
    yearMax = Math.max(+ymn.value, +ymx.value);
    document.getElementById('year-min-val').textContent = yearMin;
    document.getElementById('year-max-val').textContent = yearMax;
    updateChart();
  }
  function syncTemp() {
    tempMin = Math.min(+tmn.value, +tmx.value);
    tempMax = Math.max(+tmn.value, +tmx.value);
    document.getElementById('temp-min-val').textContent = tempMin.toLocaleString();
    document.getElementById('temp-max-val').textContent = tempMax.toLocaleString();
    updateChart();
  }

  ymn.addEventListener('input', syncYear);
  ymx.addEventListener('input', syncYear);
  tmn.addEventListener('input', syncTemp);
  tmx.addEventListener('input', syncTemp);

  document.getElementById('reset-btn').addEventListener('click', () => {
    activeMethod = 'All';
    yearMin = 1995; yearMax = 2026;
    tempMin = 2320; tempMax = 10000;
    ymn.value = 1995; ymx.value = 2026;
    tmn.value = 2320; tmx.value = 10000;
    document.getElementById('year-min-val').textContent = 1995;
    document.getElementById('year-max-val').textContent = 2026;
    document.getElementById('temp-min-val').textContent = '2500';
    document.getElementById('temp-max-val').textContent = '10,000';
    document.querySelectorAll('.method-btn').forEach((b,i) => {
      b.classList.toggle('active', i === 0);
    });
    updateChart();
  });
}

// ── CHART ─────────────────────────────────────────────────────────────────────
let svg, dotsG, xScale, yScale;
const margin = { top: 20, right: 24, bottom: 54, left: 64 };

function initChart() {
  const container = document.getElementById('chart-container');
  const W = container.clientWidth;
  const H = container.clientHeight;
  const w = W - margin.left - margin.right;
  const h = H - margin.top - margin.bottom;

  svg = d3.select('#chart-container').append('svg')
    .attr('width', W).attr('height', H);

  const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

  xScale = d3.scaleLog().domain([0.1, 12000]).range([0, w]).clamp(true);
  yScale = d3.scaleLog().domain([0.3, 35]).range([h, 0]).clamp(true);

  // Grid
  const xTicks = [0.1,0.3,1,3,10,30,100,300,1000,3000,10000];
  const yTicks = [0.3,0.5,1,2,3,5,10,20,30];

  g.append('g').attr('class','grid')
    .selectAll('line').data(yTicks).enter().append('line')
    .attr('x1',0).attr('x2',w)
    .attr('y1', d => yScale(d)).attr('y2', d => yScale(d))
    .attr('stroke','#131f35').attr('stroke-width', 0.5);

  g.append('g').attr('class','grid')
    .selectAll('line').data(xTicks).enter().append('line')
    .attr('x1', d => xScale(d)).attr('x2', d => xScale(d))
    .attr('y1',0).attr('y2',h)
    .attr('stroke','#131f35').attr('stroke-width', 0.5);

  // Axes
  const xAxis = d3.axisBottom(xScale)
    .tickValues([0.1,1,10,100,1000,10000])
    .tickFormat(d => d < 1 ? d : d3.format(',')(d));
  const yAxis = d3.axisLeft(yScale)
    .tickValues([0.3,0.5,1,2,3,5,10,20,30])
    .tickFormat(d => d);

  g.append('g').attr('class','axis').attr('transform',`translate(0,${h})`).call(xAxis);
  g.append('g').attr('class','axis').call(yAxis);

  // Axis labels
  g.append('text').attr('class','axis-label')
    .attr('x', w/2).attr('y', h + 44)
    .attr('text-anchor','middle')
    .text('Planet Mass (Earth Masses)');

  g.append('text').attr('class','axis-label')
    .attr('transform','rotate(-90)')
    .attr('x', -h/2).attr('y', -50)
    .attr('text-anchor','middle')
    .text('Planet Radius (Earth Radii)');

  // Dots layer
  dotsG = g.append('g').attr('class','dots-layer');

  // Solar system reference points
  const refG = g.append('g').attr('class','ref-layer');
  SOLAR.forEach(p => {
    const cx = xScale(p.m), cy = yScale(p.r);
    refG.append('path')
      .attr('d', d3.symbol().type(d3.symbolStar).size(120)())
      .attr('transform', `translate(${cx},${cy})`)
      .attr('fill', p.color)
      .attr('stroke', 'white').attr('stroke-width', 0.8)
      .attr('class','ref-star');

    // Label positioning
    let lx = cx, ly = cy, anchor = 'middle', dy = 0;
    if (p.name === 'Earth') {
      ly = cy + 22; anchor = 'middle'; dy = 0;
    } else if (p.name === 'Neptune') {
      lx = cx + 8; ly = cy - 14; anchor = 'start';
    } else if (p.name === 'Jupiter') {
      lx = cx + 8; ly = cy - 14; anchor = 'start';
    }

    // Arrow for Earth
    if (p.name === 'Earth') {
      refG.append('line')
        .attr('x1', cx).attr('y1', cy + 7)
        .attr('x2', cx).attr('y2', ly - 8)
        .attr('stroke', p.color).attr('stroke-width', 1)
        .attr('marker-end', `url(#arrow-${p.name})`);

      // Define arrowhead
      const defs = svg.append('defs');
      defs.append('marker')
        .attr('id', `arrow-${p.name}`)
        .attr('markerWidth', 6).attr('markerHeight', 6)
        .attr('refX', 3).attr('refY', 3)
        .attr('orient', 'auto')
        .append('path')
        .attr('d', 'M0,0 L0,6 L6,3 z')
        .attr('fill', p.color);
    }

    const bbox_pad = 4;
    const labelG = refG.append('g');
    const rect = labelG.append('rect')
      .attr('rx', 3).attr('ry', 3)
      .attr('fill', p.color).attr('opacity', 0.9)
      .attr('stroke', 'white').attr('stroke-width', 0.6);
    const text = labelG.append('text')
      .attr('class','ref-label')
      .attr('fill','white')
      .attr('text-anchor', anchor)
      .attr('dominant-baseline','middle')
      .attr('font-size', 10).attr('font-weight', 700)
      .text(` ${p.name} `);

    // Position after append so we can get text bbox
    text.attr('x', lx).attr('y', ly);
    setTimeout(() => {
      try {
        const bb = text.node().getBBox();
        rect.attr('x', bb.x - bbox_pad/2).attr('y', bb.y - bbox_pad/2)
            .attr('width', bb.width + bbox_pad).attr('height', bb.height + bbox_pad);
      } catch(e) {}
    }, 50);
  });

  updateChart();
}

// ── UPDATE ────────────────────────────────────────────────────────────────────
function isVisible(d) {
  if (activeMethod !== 'All' && d.mt !== activeMethod) return false;
  if (d.y < yearMin || d.y > yearMax) return false;
  if (d.t < tempMin || d.t > tempMax) return false;
  return true;
}

function updateChart() {
  const visible = DATA.filter(isVisible);
  const hidden = DATA.filter(d => !isVisible(d));

  document.getElementById('count-badge').textContent = `${visible.length.toLocaleString()} exoplanets`;

  // Sort: small (faint) first, large on top
  const sorted = [...DATA].sort((a,b) => dotSize(a.r) - dotSize(b.r));

  const dots = dotsG.selectAll('.dot').data(sorted, d => d.n);

  dots.enter().append('circle')
    .attr('class','dot')
    .attr('cx', d => xScale(d.m))
    .attr('cy', d => yScale(d.r))
    .attr('r', d => dotSize(d.r))
    .attr('fill', d => tempScale(Math.min(Math.max(d.t, TEMP_MIN), TEMP_MAX)))
    .attr('opacity', 0.75)
    .on('mousemove', showTooltip)
    .on('mouseleave', hideTooltip)
    .merge(dots)
    .attr('cx', d => xScale(d.m))
    .attr('cy', d => yScale(d.r))
    .attr('r', d => dotSize(d.r))
    .attr('fill', d => tempScale(Math.min(Math.max(d.t, TEMP_MIN), TEMP_MAX)))
    .classed('dimmed', d => !isVisible(d));

  dots.exit().remove();
}

// ── TOOLTIP ───────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

function showTooltip(event, d) {
  tooltip.innerHTML = `
    <div class="tt-name">${d.n}</div>
    <div class="tt-row"><span>Host Star</span><span>${d.h}</span></div>
    <div class="tt-row"><span>Mass</span><span>${d.m < 10 ? d.m.toFixed(2) : d.m.toFixed(0)} M⊕</span></div>
    <div class="tt-row"><span>Radius</span><span>${d.r.toFixed(2)} R⊕</span></div>
    <div class="tt-row"><span>Star Temp</span><span>${d.t.toLocaleString()} K</span></div>
    <div class="tt-row"><span>Discovered</span><span>${d.y}</span></div>
    ${d.a ? `<div class="tt-row"><span>Orbit (AU)</span><span>${d.a.toFixed(3)}</span></div>` : ''}
    ${d.d ? `<div class="tt-row"><span>Distance</span><span>${d.d.toFixed(1)} pc</span></div>` : ''}
    <span class="tt-method">${d.mt}</span>
  `;
  tooltip.classList.add('visible');
  positionTooltip(event);
}

function hideTooltip() {
  tooltip.classList.remove('visible');
}

function positionTooltip(event) {
  const tw = 240, th = 180;
  let x = event.clientX + 14;
  let y = event.clientY - 20;
  if (x + tw > window.innerWidth - 8) x = event.clientX - tw - 14;
  if (y + th > window.innerHeight - 8) y = window.innerHeight - th - 8;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

document.addEventListener('mousemove', e => {
  if (tooltip.classList.contains('visible')) positionTooltip(e);
});

// ── INIT ──────────────────────────────────────────────────────────────────────
drawColorbar();
buildMethodFilters();
buildSliders();
window.addEventListener('load', initChart);
window.addEventListener('resize', () => {
  d3.select('#chart-container svg').remove();
  initChart();
});
</script>
</body>
</html>
